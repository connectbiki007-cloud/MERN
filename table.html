<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Table</title>
  </head>
  <body>
    <h1>Table Format</h1>
    <thead>
      College Routine
    </thead>
    <table>
      <tr>
        <td>Semester</td>
        <td colspan="2">Course</td>
        <td>Time</td>
      </tr>
      <tr>
        <td>1st Sem</td>
        <td>C</td>
        <td>C++</td>
        <td>7:00AM - 8:20AM</td>
      </tr>
      <tr>
        <td>2nd Sem</td>
        <td>Java</td>
        <td>Python</td>
        <td>9:00 AM - 10:30 AM</td>
      </tr>
    </table>
  </body>
</html>
