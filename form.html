<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Page</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <h1>Profile Form</h1>
    <form action="/profile" method="POST">
      <label for="name">Name</label>
      <input
        id="name"
        type="text"
        name="name"
        placeholder="Enter your name"
        minlength="3"
        maxlength="50"
        required
      />
      <br />
      <label for="my-age">Age</label>
      <input
        type="number"
        name="age"
        id="my-age"
        placeholder="Enter age"
        min="1"
        max="100"
      />
      <br />
      <label for="email">Email Address</label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Enter your email"
        required
      />
      <br />
      <label for="phone">Phone number</label>
      <input type="tel" name="phone" id="phone" value="+9779876540" disabled />
      <br />
      <!-- Checkbox: Multi-select -->
      <label>Hobbies</label>
      <div class="hobbie">
        <input type="checkbox" name="hobbies" checked /> Swimming
        <input type="checkbox" name="hobbies" /> Gaming
        <input type="checkbox" name="hobbies" checked /> Driving
        <input type="checkbox" name="hobbies" /> Traveling
        <input type="checkbox" name="hobbies" /> Movies
        <input type="checkbox" name="hobbies" /> Music
      </div>

      <br />

      <!-- Radio: Single select -->
      <label for="">Gender</label>
      <div class="gender">
        <input type="radio" name="gender" checked />Male
        <input type="radio" name="gender" />Female
        <input type="radio" name="gender" />Other
      </div>
      <br />

      <label for="docs">File</label>
      <input
        type="file"
        name="docs"
        id="docs"
        accept=".jpg,.png,.pdf,.doc,.xml,.html,.web"
        multiple
      />
      <br />

      <label for="meeting">Meeting date</label>
      <input type="date" name="" id="meeting" />
      <input type="time" name="" id="meeting" />
      <input type="datetime-local" name="" id="meeting" />

      <br />
      <label for="ratings">Ratings</label>
      <input
        type="range"
        name="ratings"
        id="ratings"
        min="0"
        max="9"
        step="0.5"
      />

      <br />
      <label for="color">Color</label>
      <input type="color" name="" id="color" />

      <br />
      <label for="password">Password</label>
      <input type="password" name="" id="password" />

      <br />
      <label for="search">Search</label>
      <input type="search" name="" id="search" list="animals" />
      <datalist id="Frontend">
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="JavaScript">JavaScript</option>
        <option value="React">React</option>
        <option value="NextJS">NextJS</option>
      </datalist>

      <br />
      <label for="class">Semester</label>
      <select name="class" id="class">
        <option value="" disabled selected>Select your Semester</option>
        <optgroup label="primary classes">
          <option value="sem1">1st Semester</option>
          <option value="sem2">2nd Semester</option>
          <option value="sem3">3rd Semester</option>
          <option value="sem4">4th Semester</option>
        </optgroup>
        <optgroup label="secondary classes">
          <option value="sem5">5th Semester</option>
          <option value="sem6">6th Semester</option>
          <option value="sem7">7th Semester</option>
          <option value="sem8">8th Semester</option>
        </optgroup>
      </select>

      <br />
      <label for="message">Message</label>
      <textarea name="message" id="message" rows="10" cols="50"></textarea>
      <!-- <input type="submit" value="Save Profile" /> -->

      <br />
      <button type="submit">Save Profile</button>
    </form>
  </body>
</html>
